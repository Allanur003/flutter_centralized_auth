name: centralized_auth
description: App Hub - Centralized Authentication & App Launcher
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # State Management
  provider: ^6.1.1
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # Security
  crypto: ^3.0.3
  
  # Shared Preferences
  shared_preferences: ^2.2.2

  # App Launcher - opens installed apps on device
  url_launcher: ^6.2.5

  # List installed apps on device
  device_apps: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true